<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESQ</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
}

/* FORM SCREEN */
#formPage{
  position:fixed;
  width:100%;
  height:100%;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

button{
  padding:15px 30px;
  font-size:18px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* MAIN WEBSITE (HIDDEN FIRST) */
#mainWebsite{
  display:none;
  padding:40px;
  text-align:center;
}
</style>
</head>

<body>

<!-- FORM FIRST PAGE -->
 <div id="formPage" class="form-page">

  <h1>Before entering website</h1>
  <p>Please fill the form first</p>

  <a href="https://forms.gle/jy6m9aLJ6S4oJYCK8" target="_blank" class="form-btn">
    Fill Form
  </a>

  <br><br>

  <button class="enter-btn" onclick="enterWebsite()">
    I Filled The Form → Enter Website
  </button>

</div>

<!-- YOUR WEBSITE CONTENT -->
<div id="mainWebsite">
  <h1>🎉 Welcome to RESQ Website 🎉</h1>
  <p>You entered after filling the form.</p>
</div>

<script>
function openForm(){
  window.open("https://forms.gle/jy6m9aLJ6S4oJYCK8","_blank");

  setTimeout(() => {
    document.getElementById("formPage").style.display="none";
    document.getElementById("mainWebsite").style.display="block";
  }, 5000);
}
</script>

</body>
</html>
